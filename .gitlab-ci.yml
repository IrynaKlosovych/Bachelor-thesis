# ----------------------------
# стадії виконання
# ----------------------------
stages:
  - build    
  - test
  - docker
  - deploy  
# ----------------------------
# для серверної частини
# ----------------------------
backend_build:
  stage: build
  image: python:3.11
  allow_failure: true
  script:
    - echo "Setting up Python backend..."
    - python --version
    - cd backend
    # тимчасово поки нічого не робиться
    # - pip install -r requirements.txt 

backend_test:
  stage: test
  image: python:3.11
  allow_failure: true
  script:
    - echo "Running backend tests..."
    - cd backend
    # - python -m unittest discover

backend_docker:
  stage: docker
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  script:
    - echo "Building backend Docker image..."
    - cd backend
    - docker build -t backend:$CI_COMMIT_SHORT_SHA .

# ----------------------------
# для клієнтської частини
# ----------------------------
frontend_build:
  stage: build
  image: node:20
  script:
    - echo "Setting up React frontend..."
    - cd frontend
    - npm install
    - npm run build

frontend_test:
  stage: test
  image: node:20
  script:
    - echo "Running frontend tests..."
    - cd frontend
    - npm install
    - npm run test

frontend_docker:
  stage: docker
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  script:
    - echo "Building frontend Docker image..."
    - cd frontend
    - docker build -t frontend:$CI_COMMIT_SHORT_SHA .